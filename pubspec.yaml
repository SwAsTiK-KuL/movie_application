name: platform_commons
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ─── State Management ───────────────────────────────────────
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0

  # ─── Code Generation ────────────────────────────────────────
  freezed_annotation: ^2.4.4

  # ─── Dependency Injection ───────────────────────────────────
  get_it: ^8.0.3

  # ─── Networking ─────────────────────────────────────────────
  dio: ^5.8.0+1

  # ─── Functional Programming ─────────────────────────────────
  dartz: ^0.10.1

  # ─── Image Loading ──────────────────────────────────────────
  cached_network_image: ^3.4.1

  # ─── Local Database (Drift/SQLite) ──────────────────────────
  drift: ^2.23.1                  # Drift ORM
  sqlite3_flutter_libs: ^0.5.24   # SQLite native binaries
  path_provider: ^2.1.5           # App documents directory for DB file
  path: ^1.9.1                    # File path joining

  # ─── Connectivity ───────────────────────────────────────────
  connectivity_plus: ^6.1.4       # Online/offline detection

  # ─── Background Sync ────────────────────────────────────────
  workmanager: ^0.6.0      # WorkManager background tasks

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # ─── Code Generation ────────────────────────────────────────
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.3
  drift_dev: ^2.23.1              # Drift code generator

flutter:
  uses-material-design: true